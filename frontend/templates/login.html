<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurumsal Vaka Girişi — SecureVision AI</title>
    <meta name="description" content="SecureVision AI güvenlik sistemi oturum açma sayfası. Rol bazlı erişim kontrolü (RBAC) ile güvenli giriş.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden" style="background-color: #0f172a;">
    <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 32px 32px;"></div>

    <div class="glass-panel p-8 rounded-2xl border border-slate-700 w-full max-w-md relative z-10 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wide">KURUMSAL ERİŞİM MERKEZİ</h1>
            <p class="text-xs text-slate-400 mt-2">Rol Bazlı Erişim (RBAC) ve Oturum Güvenliği Aktif</p>
        </div>

        <form action="/login" method="POST" class="space-y-4" id="login-form">
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-2">KULLANICI TİPİ</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <select name="username" id="login-username" class="w-full bg-slate-800 border border-slate-600 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500">
                        <option value="admin">Yönetici (Admin)</option>
                        <option value="operator">Operatör (Salt İzleyici)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-2">OTURUM ŞİFRESİ</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                    <input type="password" name="password" id="login-password" required placeholder="Şifrenizi Girin (123)" class="w-full bg-slate-800 border border-slate-600 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <button type="submit" id="login-submit" class="w-full bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-500 hover:to-violet-500 text-white font-bold py-3 px-4 rounded-lg transition-all flex justify-center items-center mt-4 shadow-lg shadow-blue-500/20">
                SİSTEME BAĞLAN <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-xs text-slate-500 hover:text-blue-400 transition inline-flex items-center gap-1">
                <i class="fa-solid fa-arrow-left"></i> Proje Tanıtım Sayfasına Dön
            </a>
        </div>
    </div>
</body>
</html>
